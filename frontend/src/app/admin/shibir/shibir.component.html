<div class="module-hero">
  <div class="hero-left">
    <div class="hero-icon amber"><i class="pi pi-calendar"></i></div>
    <div>
      <div class="hero-title">Shibir Events</div>
      <div class="hero-subtitle">Manage Shibir camps and attendance tracking</div>
      <span class="hero-badge">{{ rows().length }} Shibir</span>
    </div>
  </div>
  <p-button label="Add Shibir" icon="pi pi-plus" (click)="openForm()" />
</div>

<div class="table-card">
  <div class="filter-bar">
    <span class="p-input-icon-left">
      <i class="pi pi-search"></i>
      <input pInputText [(ngModel)]="searchTerm" placeholder="Search by name..." style="width:260px">
    </span>
  </div>
  <p-table [value]="filteredRows" [tableStyle]="{'min-width':'50rem'}" styleClass="p-datatable-striped">
    <ng-template pTemplate="header">
      <tr><th>Name</th><th>Date</th><th>Slug</th><th style="width:9rem">Actions</th></tr>
    </ng-template>
    <ng-template pTemplate="body" let-s>
      <tr>
        <td style="font-weight:500">{{ s.name }}</td>
        <td>{{ s.date | date:'dd MMM yyyy' }}</td>
        <td><code style="font-size:0.78rem;background:#F3F4F6;padding:2px 8px;border-radius:4px;color:#6B7280">{{ s.slug }}</code></td>
        <td>
          <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" size="small"
            (click)="openForm(s)" pTooltip="Edit" tooltipPosition="top" />
          <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" size="small"
            (click)="confirmDelete(s)" pTooltip="Archive" tooltipPosition="top" />
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr><td colspan="4" style="text-align:center;padding:3rem;color:#9CA3AF">
        <i class="pi pi-calendar" style="font-size:2rem;display:block;margin-bottom:10px;color:#D1D5DB"></i>
        No Shibir found.
      </td></tr>
    </ng-template>
  </p-table>
</div>

<p-sidebar [(visible)]="show" position="right" [style]="{width:'420px'}" [dismissible]="true">
  <ng-template pTemplate="header">
    <div style="display:flex;justify-content:space-between;align-items:center;flex:1;margin-right:8px">
      <span style="font-weight:700;font-size:1rem;color:#1F2937">{{ editing ? 'Edit Shibir' : 'Add Shibir' }}</span>
      <div style="display:flex;gap:8px">
        <p-button label="Cancel" [outlined]="true" size="small" (click)="closeForm()" />
        <p-button label="Save" size="small" [loading]="saving" (click)="save()" />
      </div>
    </div>
  </ng-template>
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="field" style="margin-bottom:18px">
      <label class="required">Name</label>
      <input pInputText formControlName="name" placeholder="Shibir name" style="width:100%">
      <small class="p-error" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">Name is required</small>
    </div>
    <div class="field" style="margin-bottom:24px">
      <label class="required">Date</label>
      <input pInputText type="date" formControlName="date" style="width:100%">
      <small class="p-error" *ngIf="form.get('date')?.invalid && form.get('date')?.touched">Date is required</small>
    </div>
    <p *ngIf="editing" style="font-size:0.83rem;color:#9CA3AF">
      Slug: <code style="background:#F3F4F6;padding:2px 6px;border-radius:4px">{{ editing.slug }}</code>
    </p>
  </form>
</p-sidebar>

<p-confirmDialog [style]="{width:'420px'}" />
