<div class="login-bg">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon"><i class="pi pi-lock"></i></div>
      <div class="brand-title">Reset Password</div>
      <div class="brand-sub">Enter your registered mobile number</div>
    </div>

    <div class="success-box" *ngIf="sent">
      <i class="pi pi-check-circle"></i>
      <p>If the number is registered, reset instructions have been sent.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!sent">
      <label class="field-label">Mobile Number <span style="color:#EF4444">*</span></label>
      <div class="input-wrap">
        <i class="pi pi-phone field-icon"></i>
        <input formControlName="mo_number" type="tel" placeholder="10-digit mobile number">
      </div>
      <div style="color:#EF4444;font-size:0.8rem;margin-top:-16px;margin-bottom:14px"
        *ngIf="form.get('mo_number')?.invalid && form.get('mo_number')?.touched">
        Enter a valid 10-digit mobile number
      </div>
      <div class="btn-wrap">
        <p-button type="submit" label="Send Reset Link" icon="pi pi-send" [loading]="loading" />
      </div>
    </form>

    <div class="back-link">
      <a routerLink="/admin/login">← Back to Login</a>
    </div>
  </div>
  <div class="footer-note">Yuvasabha TDD Management System</div>
</div>

<p-toast position="bottom-right" />
